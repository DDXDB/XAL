name: Build single-file EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ./src/XAL/XAL.sln

      - name: Publish (framework-dependent, win-x64)
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'
        run: |
          dotnet publish ./src/XAL/XAL.csproj -c Release -r win-x64 --self-contained false /p:PublishTrimmed=true /p:TrimMode=link -o ./publish

      - name: Upload publish folder
        uses: actions/upload-artifact@v4
        with:
          name: XAL-publish
          path: ./publish/**

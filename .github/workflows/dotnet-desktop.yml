name: Build and publish

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore ./src/XAL/XAL.sln

      - name: Publish (framework-dependent)
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'
        run: dotnet publish ./src/XAL/XAL.csproj -c Release -o ./publish --self-contained false

      - name: Upload publish folder
        uses: actions/upload-artifact@v4
        with:
          name: XAL-publish
          path: ./publish/**
